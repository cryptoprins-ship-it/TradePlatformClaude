name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: TradePlatformClaude

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: DUMMY_KEY_FOR_BUILD
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Typecheck
        run: mypy agent/
      - name: Lint
        run: ruff check agent/ tests/
      - name: Build
        run: python -m compileall agent/
      - name: Test
        shell: bash
        run: |
          set +e
          pytest
          code=$?
          if [ $code -eq 5 ]; then
            echo "No tests collected — acceptable during scaffold phase."
            exit 0
          fi
          exit $code
